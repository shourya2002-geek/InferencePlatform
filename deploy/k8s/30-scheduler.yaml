# Scheduler: 2 active/active replicas. The Redis Stream consumer group
# load-balances ingest entries across them, so this is HA without leader election.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: inference
spec:
  replicas: 2
  selector: { matchLabels: { app: scheduler } }
  template:
    metadata:
      labels: { app: scheduler }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
    spec:
      containers:
        - name: scheduler
          image: pytorch-inference-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "services.scheduler.main"]
          ports: [{ containerPort: 8085 }]
          envFrom:
            - configMapRef: { name: platform-config }
          readinessProbe:
            httpGet: { path: /readyz, port: 8085 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: inference
spec:
  selector: { app: scheduler }
  ports: [{ port: 8085, targetPort: 8085 }]
