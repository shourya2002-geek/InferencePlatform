apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: inference
data:
  REDIS_URL: "redis://redis:6379/0"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "k8s"
  OTEL_TRACES_EXPORTER: "none"
  MAX_BATCH_SIZE: "32"
  MAX_WAIT_MS: "10"
  SCHEDULER_STRATEGY: "priority"
  RUNTIME_BACKEND: "stub"
  DEVICE: "cpu"
  DEFAULT_MODEL: "resnet"
  DEFAULT_MODEL_VERSION: "v2"
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: inference
type: Opaque
stringData:
  GATEWAY_API_KEYS: "demo-key-staff,demo-key-ml"
