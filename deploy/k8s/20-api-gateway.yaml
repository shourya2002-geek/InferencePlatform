apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: inference
spec:
  replicas: 3
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api-gateway
          image: pytorch-inference-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "services.api_gateway.main:app", "--host", "0.0.0.0", "--port", "8080"]
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: platform-config }
            - secretRef: { name: gateway-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: inference
spec:
  selector: { app: api-gateway }
  ports: [{ port: 80, targetPort: 8080 }]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
